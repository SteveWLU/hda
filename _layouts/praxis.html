<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link href='https://fonts.googleapis.com/css?family=Barlow' rel='stylesheet'>
  <link rel="stylesheet" href="{{site.baseurl}}/assets/css/tutorial.css">
  <script src="{{site.baseurl}}/assets/js/tutorial.js"></script>

{% include head.html %}

</head>

<body>
    {% include header.html %}

    <main class="page-content" aria-label="Content">
    
    <div id="wrapper">    
        <h1>{{page.title}}</h1>

        <div id="tei-praxis"></div>

    </div>

    </main>

        <div id="edition-footer">
                {% include footer.html %}
        </div>

        <script>

        var CETEIcean = new CETEI();

        CETEIcean.getHTML5("{{site.baseurl}}/praxis/b-praxis.xml", function(data) {

                var teipraxis = data.querySelector("tei-text")
                document.getElementById("tei-praxis").innerHTML = ""
                document.getElementById("tei-praxis").appendChild(teipraxis)
                CETEIcean.addStyle(document, data)

        });



        </script>

    </body>

</html>
